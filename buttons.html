<!-- lets firsr create our buttons we then present the style tag-->
<style>
	.subscribe-button
	{
		background-color : red;
		color:white;

		border-radius: 2px;
		height: 50px;
		border : none;
		cursor : pointer;
		margin-right: 100px;
	}

	.share-button
	{
		background-color :white;
		width : 90px;
		color: blue;
		height : 50px;
		cursor : pointer;
		border-radius: 2px;
		border-style: solid;
		margin-right: 100px;
	}

	.tweet-button
	{
		background-color: rgb(2, 158, 255);
		border-radius: 18px;
		color: white;
		height: 36px;
		width: 74px;
		border: none;
		cursor: pointer;

	}

	.share-button:hover 
	{
		background-color: green;
		color: whitesmoke;
		border : none;
		border-radius: 18px;
		height : 36px;
		width: 74px;
	}

	.subscribe-button:active
	{
		background-color : blue;
		height: 36px;
		width: 74px;
	}


</style>

<button class = "subscribe-button">SUBSCRIBE</button>

<button class = "share-button">SHARE</button>

<button class = "tweet-button"> TWEET</button>
