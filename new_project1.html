<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>New project 1</title>

	<style>
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
		.pickup
		{
			margin-bottom: 20px;
			display : block;
		}

		.drop
		{
			margin-top: 30px;
			margin-bottom: 30px;
			display : block 
		}

		.request_button
		{

			background-color: black;
			color: white;
			transition: opacity 0.15s;
			display : inline;
		}

		.request_button:hover
		{
			opacity: 0.8;
		}

		.schedule
		{
			background-color: offwhite;
			color: black;
			display: inline;
			transition: opacity 0.5;
		}

		.schedule:hover 
		{
			opacity: 0.8;
		}
	</style>
</head>
<body>
	<h3>Request ride now </h3>

	<input type="text" , class = "pickup" ,name = "pickup" placeholder = "Enter pickup location">

	<input type="text" name="drop"  class = "drop" , placeholder = "Enter the drop location">

	<button class= "request_button">Request Now</button>

	<button class = "schedule"> Schedule for later</button>
</body>
</html>
